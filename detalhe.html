<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Pacote — Memória 4K</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2026_audit_hardfix">
</head>
<body>
  <nav class="navbar">
    <div class="navbar__logo">
      <div class="navbar__logo-icon">✦</div>
      <a href="index.html" style="color:inherit; text-decoration:none;">Memória 4K</a>
    </div>
    <ul class="navbar__links" id="nav-links">
      <li><a href="index.html#inicio">Início</a></li>
      <li><a href="index.html#catalogo">Ensaios</a></li>
      <li><a href="index.html#lifestyle">Elite & Sucesso</a></li>
      <li><a href="index.html#restauracao">Restauração</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1 class="page-title" id="detail-title">Carregando...</h1>
      <p class="page-subtitle">Sua imagem transformada em obra de arte 8K em até 24h.</p>
    </div>
  </header>

  <main class="container">
    <div class="detail-layout">
      <!-- Galeria -->
      <div class="detail-gallery reveal">
        <div id="main-img-wrap" style="aspect-ratio:4/3; background:#000; border-radius:16px; overflow:hidden;">
          <img id="main-gallery-img" src="" alt="Principal" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="detail-thumbs" id="thumb-container" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:12px;"></div>
      </div>

      <!-- Info -->
      <div class="detail-info reveal" style="transition-delay:0.1s;">
        <p id="detail-desc" class="detail-description"></p>
        <div class="calculator-box">
          <p class="calc-title">Selecione a quantidade</p>
          <div class="qty-selector" id="qty-container"></div>
          <div class="price-display">
            <span class="label">Total</span>
            <span class="value" id="total-price">R$ 0,00</span>
          </div>
          <a id="btn-wpp-checkout" href="#" target="_blank" rel="noopener" class="btn-primary" style="display:block; text-align:center; text-decoration:none; background:#25D366; color:#fff; padding:18px; border-radius:10px; font-weight:600;">Pedir no WhatsApp</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__logo">✦ Memória 4K</div>
      <span class="footer__copy">© 2026 Memória 4K.</span>
    </div>
  </footer>

  <script src="js/data.js?v=2026_audit_hardfix"></script>
  <script src="js/main.js?v=2026_audit_hardfix"></script>
</body>
</html>
