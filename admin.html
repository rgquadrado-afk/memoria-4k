<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficina MemÃ³ria 4K â€” Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --dark-bg: #0F1A15; --white: #FFFFFF; --terracotta: #C26A40; --amber: #D4885A; --forest-deep: #1C3F3A; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark-bg); color: var(--white); margin: 0; padding: 40px; }
    .admin-container { max-width: 900px; margin: 0 auto; }
    .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; margin-bottom: 24px; text-align: center; }
    h1 { font-weight: 500; letter-spacing: -1px; }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }
    button { background: var(--terracotta); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 40px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
    th { color: var(--amber); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="glass-card">
      <h1>Oficina <em>MemÃ³ria 4K</em></h1>
      <p>Gerenciamento de Ativos e Prompts de IA.</p>
      
      <div id="login-form">
        <input type="password" id="admin-pass" placeholder="Senha mÃ­stica de acesso">
        <button id="login-btn">Entrar na Oficina</button>
      </div>

      <div id="admin-panel" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>Pacote</th>
              <th>Status Imagens</th>
              <th>Prompt Base</th>
            </tr>
          </thead>
          <tbody id="admin-table-body">
            <!-- Populado via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    const loginBtn = document.getElementById('login-btn');
    const adminPass = document.getElementById('admin-pass');
    const loginForm = document.getElementById('login-form');
    const adminPanel = document.getElementById('admin-panel');
    const tableBody = document.getElementById('admin-table-body');

    loginBtn.addEventListener('click', () => {
      if (adminPass.value === 'memoria4k2026') {
        loginForm.style.display = 'none';
        adminPanel.style.display = 'block';
        loadAdmin();
      } else {
        alert('Acesso negado.');
      }
    });

    function loadAdmin() {
      const all = [...catalogData.tematicos, ...catalogData.lifestyle, ...catalogData.restauracao];
      tableBody.innerHTML = all.map(p => `
        <tr>
          <td>${p.title}</td>
          <td><span style="color: ${p.gallery.includes(p.placeholderImg) ? '#ff9800' : '#4caf50'}">${p.gallery.includes(p.placeholderImg) ? 'Pendente' : 'Completo'}</span></td>
          <td style="font-size: 10px; color: rgba(255,255,255,0.5);">${p.aiPrompt.substring(0, 50)}...</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
